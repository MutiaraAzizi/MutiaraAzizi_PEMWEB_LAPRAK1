<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Berhasil Dikirim</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
overflow:hidden;
text-align:center;
background:black;
}

/* GIF Full Screen */
.gif-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* Overlay gelap */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

/* Box tengah */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
padding:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(8px);
border-radius:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
animation:zoomIn 1s ease;
width:90%;
max-width:700px;
}

.content h1{
font-size:45px;
margin-bottom:15px;
text-shadow:2px 2px 10px rgba(0,0,0,0.4);
}

.content p{
font-size:20px;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
text-decoration:none;
font-size:18px;
border-radius:15px;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

@keyframes zoomIn{
from{
opacity:0;
transform:translate(-50%,-50%) scale(0.7);
}
to{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}
}

</style>
</head>

<body>

<img class="gif-bg" src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif">

<div class="overlay"></div>

<div class="content">
<h1>🎉 Data Telah Berhasil Dikirim</h1>
<p>Terima kasih telah mengisi form data mahasiswa.</p>

<a href="index.html" class="btn">Kembali ke Halaman Utama</a>
</div>

</body>
</html>
